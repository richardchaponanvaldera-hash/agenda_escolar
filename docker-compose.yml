version: "3.8"

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sistema-escolar-web
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: sistema-escolar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: sistema_escolar
      MYSQL_USER: escolar_user
      MYSQL_PASSWORD: change_me
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sistema-escolar-pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
