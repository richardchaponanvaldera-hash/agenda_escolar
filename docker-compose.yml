# ============================================
# DOCKER COMPOSE - Sistema de Gestión Escolar
# I.E. Augusto B. Leguía
# ============================================

version: '3.8'

services:
  # ============================================
  # SERVICIO: Aplicación Web (Nginx)
  # ============================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-escolar-web
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      # Montar archivos en modo desarrollo (opcional)
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - sistema-escolar-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # SERVICIO: Nginx con SSL (Producción)
  # ============================================
  nginx-proxy:
    image: nginx:alpine
    container_name: sistema-escolar-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - sistema-escolar-network
    profiles:
      - production

# ============================================
# REDES
# ============================================
networks:
  sistema-escolar-network:
    driver: bridge

# ============================================
# VOLÚMENES (si agregas backend después)
# ============================================
volumes:
  mysql-data:
    driver: local
